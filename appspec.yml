version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/app
    overwrite: true
file_exists_behavior: OVERWRITE
hooks:
  ApplicationStop:
    - location: scripts/deploy/stop.sh
      timeout: 10
      runas: root
  AfterInstall:
    - location: scripts/deploy/install.sh
      timeout: 180
      runas: ec2-user
  ApplicationStart:
    - location: scripts/deploy/start.sh
      timeout: 10
      runas: root
  ValidateService:
    - location: scripts/deploy/validate.sh
      timeout: 30
      runas: ec2-user
