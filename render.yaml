services:
  - type: web
    name: 2connectv1-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_PREFIX
        value: /api
      - key: API_VERSION
        value: "1"
      # Database - Supabase
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_SSL
        value: "true"
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 96h
      - key: TEMP_JWT_SECRET
        generateValue: true
      - key: TEMP_JWT_EXPIRES_IN
        value: 15m
      - key: TEMP_JWT_ISS
        value: 2connect-auth
      - key: TEMP_JWT_AUD
        value: password-reset
      # Rate Limiting
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "100"
      # Bcrypt
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      # AWS
      - key: AWS_REGION
        value: eu-west-2
      - key: AWS_S3_BUCKET
        sync: false
      # AI Service
      - key: AI_SERVICE_URL
        value: https://twoconnectv1-ai.onrender.com/api/v1
      - key: AI_SERVICE_WEBHOOK_API_KEY
        generateValue: true
      - key: AI_SERVICE_API_KEY
        generateValue: true
      # App
      - key: APP_NAME
        value: 2Connect AI
      - key: PERSONAS_PER_WEEK
        value: "5"
      # Redis - Upstash
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      # Frontend
      - key: FRONT_END_BASE_URL
        value: https://2connectv1-frontend.vercel.app
      # Stream Chat
      - key: STREAM_API_KEY
        value: g39azx89q877
      - key: STREAM_API_SECRET
        sync: false
      # Email - Gmail
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_FROM
        sync: false
